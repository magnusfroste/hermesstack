# HermesHotel — auto-generated docker-compose.yml
# DO NOT EDIT MANUALLY — use scripts/generate-compose.py

services:

  redis:
    image: redis:7-alpine
    container_name: hermes-redis
    restart: unless-stopped
    volumes:
      - redis-data:/data
    networks:
      - hermes-network
    command: redis-server --appendonly yes

  hermes-lobby:
    image: python:3.12-alpine
    container_name: hermes-lobby
    restart: unless-stopped
    working_dir: /app
    environment:
      - HERMESHOTEL_WEB_PORT=3099
      - HERMESHOTEL_REFRESH_SECONDS=5
    volumes:
      - /opt/hermeshotel/hermes-web.py:/app/hermes-web.py:ro
      - /opt/hermeshotel/instances.json:/app/instances.json:ro
      - /var/run/docker.sock:/var/run/docker.sock:ro
    ports:
      - "127.0.0.1:3099:3099"
    command: ["python", "/app/hermes-web.py"]
    networks:
      - hermes-network

volumes:
  redis-data:

networks:
  hermes-network:
    driver: bridge
