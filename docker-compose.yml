version: '3.8'

services:
  hermes-agent:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: hermes-agent
    restart: unless-stopped
    ports:
      - "3000:3000"
    environment:
      # Required: API keys (set these in Easypanel UI)
      - OPENAI_API_KEY=${OPENAI_API_KEY:-}
      - ANTHROPIC_API_KEY=${ANTHROPIC_API_KEY:-}
      
      # Hermes configuration
      - HERMES_HOME=/root/.hermes
      - HERMES_MODEL=${HERMES_MODEL:-openai/gpt-4o-mini}
      
      # Optional: Other service keys
      - TELEGRAM_BOT_TOKEN=${TELEGRAM_BOT_TOKEN:-}
      - DISCORD_BOT_TOKEN=${DISCORD_BOT_TOKEN:-}
      - SLACK_BOT_TOKEN=${SLACK_BOT_TOKEN:-}
      
    volumes:
      # Persist Hermes data (config, memory, logs)
      - hermes-data:/root/.hermes
      
    labels:
      # Easypanel / Traefik labels
      - "traefik.enable=true"
      - "traefik.http.routers.hermes.rule=Host(`${EASYPANEL_DOMAIN:-hermes.froste.eu}`)"
      - "traefik.http.routers.hermes.entrypoints=websecure"
      - "traefik.http.routers.hermes.tls.certresolver=letsencrypt"
      - "traefik.http.services.hermes.loadbalancer.server.port=3000"
      # WebSocket support
      - "traefik.http.services.hermes.loadbalancer.server.scheme=http"
      
    networks:
      - hermes-network

volumes:
  hermes-data:
    driver: local

networks:
  hermes-network:
    driver: bridge
