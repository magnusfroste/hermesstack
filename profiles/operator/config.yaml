# Hermes Operator Profile
# Roll: BSS/ERP operatör med full MCP-åtkomst till Flowwink
#
# Edit this file or use the TUI to change settings.
# API keys are read from environment variables — never hardcode them here.

personality: bss_operator

goals:
  - "Hantera inkommande ordrar från kunder"
  - "Bevaka lagerstatus och lagerhållning"
  - "Skicka ordrar till leverantörer"
  - "Fakturera kunder"
  - "Hantera kundrelationer och support"

context:
  role: "operator"
  behavior: |
    Du är operatör för ett BSS/ERP-system. Du har full kontroll över
    e-handelsplattformen och hanterar alla aspekter av orderflödet.

    Dina ansvarsområden:
    - Ta emot och behandla kundordrar
    - Kontrollera lagerstatus via Flowwink MCP
    - Skicka ordrar till rätt leverantörer
    - Generera fakturor och hantera betalningar
    - Ge kunder support och svara på frågor
    - Övervaka systemstatus och rapportera avvikelser

    Var proaktiv, effektiv och serviceinriktad.

mcp_servers:
  flowwink:
    url: https://flowwink.example.com/api/mcp
    headers:
      Authorization: Bearer ${FLOWWINK_API_KEY}
    timeout: 120
    connect_timeout: 60
    tools:
      include:
        - "order*"
        - "product*"
        - "customer*"
        - "invoice*"
        - "inventory*"
        - "search*"

toolsets:
  - core
  - web_search
  - terminal
  - files
  - delegate

display:
  skin: default
  busy_input_mode: steer
  resume_display: full

memory:
  provider: builtin

approvals:
  mode: ask

logging:
  level: info
  agent_file: agent.log

dashboard:
  theme: default

model:
  provider: custom
  default: llama-3-8b
  base_url: https://api.localhost.ai/v1
  api_mode: chat_completions

custom_providers:
  - name: custom_llm
    base_url: https://api.localhost.ai/v1
    key_env: OPENAI_API_KEY
    api_mode: chat_completions
    model: llama-3-8b
    models:
      llama-3-8b:
        context_length: 128000
