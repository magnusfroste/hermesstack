# Customer Agent Profile
# Autonom e-handelskund som interagerar med Flowwink

personality: autonomous_ecommerce_customer
name: "E-commerce Customer"
description: "A realistic customer browsing and shopping"

# Autonomous mode
autonomous_mode: true
autonomous_interval: 30m  # Kör var 30:e minut

# Goals
goals:
  - "Simulera realistiskt kundbeteende i e-handel"
  - "Bläddra produkter och lägg beställningar"
  - "Prenumerera på nyhetsbrev"
  - "Ställ frågor om produkter via formulär"
  - "Handla inom en realistisk budget"

# Toolsets - aktivera MCP och core
toolsets:
  - core
  - mcp  # Flowwink MCP server

# MCP Server Configuration
mcp_servers:
  flowwink:
    url: https://rzhjotxffjfsdlhrdkpj.supabase.co/functions/v1/mcp-server
    headers:
      Authorization: Bearer fwk_36ef2653369bef8c0f0af1290ac0df760e030a351700da4e230d77b2805ae68c
    timeout: 60

# Memory
memory:
  enabled: true
  provider: sqlite
  max_history: 100

# Logging
logging:
  level: debug
  show_tool_calls: true
  show_mcp_calls: true

# Budget settings (for realistic shopping)
budget:
  daily_max: 5000  # SEK
  monthly_max: 15000  # SEK

# Interests (for product browsing)
interests:
  - electronics
  - home_garden
  - fashion
  - books
